<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Sheet</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    
</head>
<body>
    <div class="background">
        <div class="title">
            <img class="logo" src="img/logo.png" alt="plane-logo">
            <p>Travel</p>
        </div>
        <div class="credit">
            Photo by <a href="https://unsplash.com/photos/wReRjmz7EQw">Luis Fallas</a>
            <br>
            Logo by <a href="https://pngwing.com">Pngwing</a>
        </div>
    </div>
    <div class="container">
        <div class="topInfo">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
            <p>Sign up <em>now</em> to get started.</p>
            <p>You <em>know</em> you want to.</p>
        </div>
        <div class="inputs">
            <fieldset>
                <h2>Let's sign up!</h2>
                <form action="#" class="form" method="get">
                    <div class="wrapper">
                        <div>
                            <label for="first-name">First Name<span class="validFirstName"> </span></label>
                            <input type="text" name="first-name" id="first-name" required maxlength="40">
                            <span></span>
                        </div>
                        <div>
                            <label for="last-name">Last Name<span class="validLastName"> </span></label>
                            <input type="text" name="last-name" id="last-name" required maxlength="40">
                            <span></span>
                        </div>
                    </div>
                    <div class="wrapper">
                        <div>
                            <label for="email">Email<span class="validEmail"></span></label>
                            <input type="email" name="email" id="email">
                            <span class="emailError"></span>
                        </div>
                        <div>
                            <label for="phone">Phone number<span class="validPhone"></span></label>
                            <input type="tel" name="phone" id="phone" maxlength="10" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">
                            <span class="phoneError"></span>
                        </div>
                    </div>
                    <div class="wrapper">
                        <div>
                            <label for="password">Password<span class="validPassword"></span></label>
                            <input type="password" name="password" id="password" maxlength="25" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,}">
                            <span class="passwordError"></span>
                        </div>
                        <div>
                            <label for="confirm-password">Confirm password<span class="validConfirmPassword"></span></label>
                            <input type="password" name="confirm-password" id="confirm-password" maxlength="25" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,}">
                            <span class="confirmPasswordError"></span>
                        </div>
                    </div>
                </form>
            </fieldset>
        </div>
        <div class="bottomInfo">
            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="">Log in</a></p>
        </div>
    </div>
</html>
